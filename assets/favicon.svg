<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Tus Citas Clínicas">
  <defs>
    <linearGradient id="tccBg" x1="6" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E40AF"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="tccHeader" x1="12" y1="17" x2="52" y2="25" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#BFDBFE"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="tccCheck" x1="42" y1="42" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>

  <!-- rounded blue gradient background -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#tccBg)"/>
  <!-- soft top highlight -->
  <rect x="2" y="2" width="60" height="22" rx="15" fill="#FFFFFF" fill-opacity="0.10"/>

  <!-- calendar binder loops -->
  <rect x="20" y="10" width="4.5" height="10" rx="2.2" fill="#BFDBFE"/>
  <rect x="39.5" y="10" width="4.5" height="10" rx="2.2" fill="#BFDBFE"/>

  <!-- calendar body -->
  <rect x="12" y="17" width="40" height="35" rx="5.5" fill="#FFFFFF"/>
  <!-- calendar header strip (rounded top, flat bottom) -->
  <path d="M12 22 A5.5 5.5 0 0 1 17.5 16.5 L46.5 16.5 A5.5 5.5 0 0 1 52 22 L52 25.5 L12 25.5 Z" fill="url(#tccHeader)"/>

  <!-- abstract wellness figure inside calendar -->
  <circle cx="32" cy="33" r="3.4" fill="#2563EB"/>
  <path d="M22.5 45c1.8-5.6 5.2-8.3 9.5-8.3s7.7 2.7 9.5 8.3" stroke="#2563EB" stroke-width="2.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- confirmation check badge -->
  <circle cx="51" cy="51" r="11" fill="#FFFFFF"/>
  <circle cx="51" cy="51" r="9" fill="url(#tccCheck)"/>
  <path d="M46.4 51.2l3.2 3.1 6-6.2" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
